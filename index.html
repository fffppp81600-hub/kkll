<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Fast</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#07080c;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  width:100%;
  max-width:420px;
  padding:20px;
}
.card{
  background:#171820;
  border-radius:28px;
  padding:25px;
}
input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:16px;
  border:none;
}
button{
  background:#00f59b;
  font-weight:bold;
}
.progress{
  height:10px;
  background:#222;
  margin-top:15px;
  border-radius:10px;
}
.bar{
  height:100%;
  width:0;
  background:#00f59b;
}
.status{margin-top:10px;color:#aaa}
a{
  display:block;
  margin-top:15px;
  background:#00f59b;
  color:black;
  padding:14px;
  border-radius:16px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>⚡ تحويل صور إلى PDF</h2>

<input id="files" type="file" accept="image/*" multiple>

<button onclick="go()">تحويل</button>

<div class="progress"><div id="bar" class="bar"></div></div>
<div id="status" class="status"></div>

<div id="result"></div>

</div>
</div>

<script>
async function go(){
  const files=document.getElementById("files").files;
  const status=document.getElementById("status");
  const bar=document.getElementById("bar");
  const result=document.getElementById("result");

  if(files.length===0){
    status.innerHTML="اختر صور";
    return;
  }

  result.innerHTML="";
  bar.style.width="0%";

  const {jsPDF}=window.jspdf;
  let pdf=null;

  for(let i=0;i<files.length;i++){
    status.innerHTML=`${i+1}/${files.length}`;

    const imgData=await read(files[i]);
    const img=await load(imgData);

    const w=img.width;
    const h=img.height;

    const orient=w>h?"landscape":"portrait";

    if(i===0){
      pdf=new jsPDF({orientation:orient,unit:"px",format:[w,h]});
    }else{
      pdf.addPage([w,h],orient);
    }

    pdf.addImage(imgData,"JPEG",0,0,w,h);

    bar.style.width=((i+1)/files.length*100)+"%";
  }

  const blob=pdf.output("blob");
  const url=URL.createObjectURL(blob);

  status.innerHTML="جاهز ✅";

  result.innerHTML=`<a href="${url}" download="images.pdf" onclick="alert('بدأ تنزيل PDF ✅')">تنزيل PDF</a>`;
}

function read(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=e=>r(e.target.result);
    reader.readAsDataURL(file);
  });
}

function load(src){
  return new Promise(r=>{
    let img=new Image();
    img.onload=()=>r(img);
    img.src=src;
  });
}
</script>

</body>
</html>
