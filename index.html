<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PDF Fast</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
  background:
    radial-gradient(circle at 20% 20%, #00f59b33, transparent 35%),
    radial-gradient(circle at 80% 80%, #00d9ff33, transparent 35%),
    #05060a;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}
.app{width:100%;max-width:430px}
.card{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:32px;
  padding:28px;
  box-shadow:0 30px 90px rgba(0,0,0,.65);
  text-align:center;
}
.logo{
  width:76px;height:76px;
  margin:0 auto 16px;
  border-radius:24px;
  background:linear-gradient(135deg,#00f59b,#00d9ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  box-shadow:0 0 35px #00f59b55;
}
h1{margin:0;font-size:32px}
p{color:#aaa;margin:10px 0 20px}
input{
  width:100%;
  padding:15px;
  border:0;
  border-radius:18px;
  background:#1c1e26;
  color:white;
}
button{
  width:100%;
  padding:17px;
  margin-top:16px;
  border:0;
  border-radius:22px;
  background:linear-gradient(90deg,#00f59b,#00d9ff);
  color:#001;
  font-weight:900;
  font-size:17px;
}
.progress{
  height:12px;
  margin-top:16px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}
.bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#00f59b,#00d9ff);
  transition:.25s;
}
.status{
  margin-top:14px;
  color:#ccc;
  font-weight:700;
}
</style>
</head>

<body>

<div class="app">
  <div class="card">
    <div class="logo">📄</div>
    <h1>PDF Fast</h1>
    <p>حوّل الصور إلى PDF فوريًا من جهازك</p>

    <input id="files" type="file" accept="image/*" multiple>

    <button onclick="makePDF()">تحويل PDF</button>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>

    <div id="status" class="status"></div>
  </div>
</div>

<script>
async function makePDF(){
  const files = document.getElementById("files").files;
  const status = document.getElementById("status");
  const bar = document.getElementById("bar");

  if(files.length === 0){
    status.textContent = "اختر الصور أول";
    return;
  }

  bar.style.width = "0%";
  status.textContent = "جاري التجهيز...";

  const { jsPDF } = window.jspdf;
  let pdf = null;

  for(let i = 0; i < files.length; i++){
    status.textContent = `تحويل الصورة ${i+1} من ${files.length}`;

    const imgData = await readFile(files[i]);
    const img = await loadImage(imgData);

    const w = img.naturalWidth;
    const h = img.naturalHeight;
    const orientation = w > h ? "landscape" : "portrait";

    if(i === 0){
      pdf = new jsPDF({
        orientation: orientation,
        unit: "px",
        format: [w, h],
        compress: false
      });
    }else{
      pdf.addPage([w, h], orientation);
    }

    pdf.addImage(imgData, "JPEG", 0, 0, w, h, undefined, "FAST");
    bar.style.width = Math.round(((i+1) / files.length) * 100) + "%";
  }

  status.textContent = "يتم تنزيل الملف...";

  pdf.save("images.pdf");

  status.textContent = "تم إنشاء PDF ✅ افتحه من التنزيلات أو الملفات";
}

function readFile(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

function loadImage(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = src;
  });
}
</script>

</body>
</html>
