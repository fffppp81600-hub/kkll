<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Fast</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system;
  background:
    radial-gradient(circle at top right,#103b34,transparent 35%),
    radial-gradient(circle at bottom left,#10243b,transparent 35%),
    #07080c;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.app{width:100%;max-width:430px;padding:20px;}

.card{
  background:rgba(23,24,32,.9);
  border-radius:30px;
  padding:26px;
  box-shadow:0 25px 80px rgba(0,0,0,.6);
}

.logo{
  width:70px;height:70px;
  margin:auto;
  border-radius:22px;
  background:linear-gradient(135deg,#00f59b,#00cfff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

h1{margin:15px 0 5px;font-size:26px}
.sub{color:#aaa;font-size:14px}

input{
  width:100%;
  margin-top:15px;
  padding:14px;
  border-radius:16px;
  border:none;
  background:#222;
  color:white;
}

button{
  width:100%;
  margin-top:15px;
  padding:16px;
  border:none;
  border-radius:18px;
  background:linear-gradient(90deg,#00f59b,#00d9ff);
  font-weight:bold;
  font-size:16px;
}

.progress{
  height:12px;
  background:#222;
  margin-top:15px;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f59b,#00d9ff);
  transition:.3s;
}

.status{margin-top:10px;color:#aaa}

</style>
</head>

<body>

<div class="app">
<div class="card">

<div class="logo">📄</div>

<h1>PDF Fast</h1>
<div class="sub">تحويل الصور إلى PDF فوري ⚡</div>

<input id="files" type="file" accept="image/*" multiple>

<button onclick="go()">تحويل</button>

<div class="progress"><div id="bar" class="bar"></div></div>
<div id="status" class="status"></div>

</div>
</div>

<script>
async function go(){
  const files=document.getElementById("files").files;
  const status=document.getElementById("status");
  const bar=document.getElementById("bar");

  if(files.length===0){
    status.innerHTML="اختر صور";
    return;
  }

  bar.style.width="0%";
  status.innerHTML="جاري التحويل...";

  const {jsPDF}=window.jspdf;
  let pdf=null;

  for(let i=0;i<files.length;i++){
    status.innerHTML=`${i+1}/${files.length}`;

    const imgData=await read(files[i]);
    const img=await load(imgData);

    const w=img.width;
    const h=img.height;
    const orient=w>h?"landscape":"portrait";

    if(i===0){
      pdf=new jsPDF({orientation:orient,unit:"px",format:[w,h]});
    }else{
      pdf.addPage([w,h],orient);
    }

    pdf.addImage(imgData,"JPEG",0,0,w,h);

    bar.style.width=((i+1)/files.length*100)+"%";
  }

  status.innerHTML="يتم التحميل... ⏬";

  const blob=pdf.output("blob");
  const url=URL.createObjectURL(blob);

  // تحميل مباشر
  const a=document.createElement("a");
  a.href=url;
  a.download="images.pdf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  status.innerHTML="تم الحفظ في الملفات ✅";
}

function read(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=e=>r(e.target.result);
    reader.readAsDataURL(file);
  });
}

function load(src){
  return new Promise(r=>{
    let img=new Image();
    img.onload=()=>r(img);
    img.src=src;
  });
}
</script>

</body>
</html>
